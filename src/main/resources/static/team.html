<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cricket Auction — Team Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>🏏 Cricket Auction Tracker <span class="muted">— Team Dashboard</span></h1>
  <nav><a href="players.html" class="nav-cta">📊 Players &amp; analysis</a> <a href="auction.html">← Admin console</a></nav>
</header>

<main class="owner-wrap">
  <div id="picker" class="card picker" style="display:none">
    <h2>Choose your team</h2>
    <div id="picker-links"></div>
  </div>

  <div id="dashboard" style="display:none">
    <div id="block-banner"></div>

    <section class="card hero">
      <div id="team-head"></div>
    </section>

    <section class="card">
      <h2>Squad requirements</h2>
      <div id="composition"></div>
    </section>

    <section class="card">
      <h2>Squad <span id="squad-summary" class="muted"></span></h2>
      <div class="table-scroll list-scroll squad-scroll">
        <table class="pool">
          <thead><tr><th></th><th>Player</th><th>Role</th><th>Group</th><th>Price</th></tr></thead>
          <tbody id="squad-body"></tbody>
        </table>
      </div>
    </section>
  </div>
</main>

<!-- Sold/unsold result: a full-screen reveal that shrinks into the corner card. -->
<div id="reveal-overlay" class="reveal-overlay" style="display:none">
  <div id="reveal-card" class="reveal-card"></div>
</div>
<!-- Persistent "last player sold/unsold" card, pinned bottom-right (~4cm²). -->
<div id="last-result-mini" class="last-result-mini" style="display:none"></div>

<script src="tournament-context.js"></script>
<script src="auth.js"></script>
<script src="profile-modal.js"></script>
<script src="team.js"></script>
</body>
</html>
